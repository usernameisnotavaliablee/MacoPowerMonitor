<svg xmlns="http://www.w3.org/2000/svg" width="392" height="328" viewBox="0 0 98 82" role="img" aria-labelledby="title description">
  <title id="title">无重叠电池头预览</title>
  <desc id="description">电量 45，电池头与电池本体边缘相接但没有重叠。</desc>

  <defs>
    <clipPath id="battery-body-clip">
      <rect x="9" y="20" width="69.5" height="39" rx="12" />
    </clipPath>
  </defs>

  <!--
    电池本体在 x=78.5 结束；电池头也从 x=78.5 开始。
    两个形状只共享边界，不共享面积，因此半透明颜色不会叠深。
    电池头使用平直左边缘，保证与本体连接处没有视觉缝隙。
  -->
  <path
    d="M 78.5 32 H 82 A 3.5 3.5 0 0 1 85.5 35.5 V 43.5 A 3.5 3.5 0 0 1 82 47 H 78.5 Z"
    fill="#b8b9ba"
  />

  <rect x="9" y="20" width="69.5" height="39" rx="12" fill="#b8b9ba" />

  <rect
    x="9"
    y="20"
    width="31.275"
    height="39"
    fill="#434547"
    clip-path="url(#battery-body-clip)"
  />

  <text
    x="43.75"
    y="51"
    fill="#ffffff"
    stroke="#ffffff"
    stroke-width="0.7"
    paint-order="stroke fill"
    font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif"
    font-size="34"
    font-weight="500"
    letter-spacing="0.5"
    text-anchor="middle"
  >45</text>
</svg>
