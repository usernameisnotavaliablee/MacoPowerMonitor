<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>菜单栏电池状态原型</title>
  <style>
    :root {
      color-scheme: dark;
      --page: #1f232b;
      --panel: #2a303b;
      --panel-border: rgb(255 255 255 / 10%);
      --text: #f4f6fb;
      --muted: #aab2c1;
      --empty: #b8b9ba;
      --normal: #434547;
      --external: #34c759;
      --low-power: #ffcc00;
      --critical: #ff3b30;
      --label: #fff;
      --accent: #0a84ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-width: 320px;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--text);
      background: radial-gradient(circle at top, #323949 0, var(--page) 52%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    }

    main {
      width: min(680px, 100%);
      display: grid;
      gap: 18px;
    }

    .card {
      padding: 22px;
      border: 1px solid var(--panel-border);
      border-radius: 22px;
      background: rgb(42 48 59 / 92%);
      box-shadow: 0 18px 45px rgb(0 0 0 / 22%);
    }

    h1, p { margin: 0; }
    h1 { font-size: 21px; letter-spacing: -0.3px; }
    .subtitle { margin-top: 6px; color: var(--muted); font-size: 13px; }

    .menu-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      min-height: 58px;
      margin-top: 20px;
      padding: 0 18px;
      border: 1px solid rgb(255 255 255 / 9%);
      border-radius: 14px;
      background: linear-gradient(135deg, rgb(74 82 98), rgb(42 48 59));
    }

    .battery-svg {
      display: block;
      width: 148px;
      height: auto;
      overflow: visible;
    }

    .battery-body, .battery-terminal { fill: var(--empty); }
    .battery-fill { fill: var(--normal); }
    .battery-value {
      fill: var(--label);
      stroke: var(--label);
      stroke-width: 0.7px;
      paint-order: stroke fill;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      font-weight: 500;
      letter-spacing: 0.5px;
      dominant-baseline: alphabetic;
    }

    /* The percentage contracts with a short, spring-like easing when power is
       connected, matching the bolt's entrance rather than snapping smaller. */
    .battery-value.entering-charge {
      animation: percentage-contract 420ms cubic-bezier(.16, .92, .24, 1) both;
    }

    @keyframes percentage-contract {
      0% { font-size: 34px; }
      58% { font-size: 25.8px; }
      80% { font-size: 27.7px; }
      100% { font-size: 27px; }
    }

    .battery-value.leaving-charge {
      animation: percentage-expand 420ms cubic-bezier(.16, .92, .24, 1) both;
    }

    @keyframes percentage-expand {
      0% { font-size: 27px; }
      58% { font-size: 35.2px; }
      80% { font-size: 33.3px; }
      100% { font-size: 34px; }
    }

    .charging-bolt {
      fill: var(--label);
      opacity: 0;
      transform-box: fill-box;
      transform-origin: center;
      pointer-events: none;
    }

    .charging-bolt.visible { opacity: 1; }
    .charging-bolt.entering { animation: bolt-appear 380ms cubic-bezier(.22, .8, .28, 1) both; }
    .charging-bolt.exiting { animation: bolt-disappear 260ms cubic-bezier(.4, 0, .7, .2) both; }

    @keyframes bolt-appear {
      0% { opacity: 0; transform: scale(.35); }
      52% { opacity: 1; transform: scale(1.18); }
      78% { opacity: 1; transform: scale(.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes bolt-disappear {
      0% { opacity: 1; transform: scale(1); }
      48% { opacity: 1; transform: scale(.82); }
      100% { opacity: 0; transform: scale(.35); }
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 16px;
      color: var(--muted);
      font-size: 13px;
    }

    .status-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--normal); }
    .status-dot.external { background: var(--external); }
    .status-dot.low-power { background: var(--low-power); }
    .status-dot.critical { background: var(--critical); }

    .controls { display: grid; gap: 16px; }
    .field { display: grid; gap: 8px; }
    .field-label { display: flex; justify-content: space-between; color: var(--muted); font-size: 13px; }
    output { color: var(--text); font-variant-numeric: tabular-nums; }
    input[type="range"] { width: 100%; accent-color: var(--accent); }
    .toggles { display: flex; flex-wrap: wrap; gap: 10px; }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 34px;
      padding: 0 11px;
      border: 1px solid var(--panel-border);
      border-radius: 10px;
      color: var(--text);
      background: rgb(255 255 255 / 4%);
      font-size: 13px;
      cursor: pointer;
    }
    .toggle input { accent-color: var(--accent); }

    .presets { display: flex; flex-wrap: wrap; gap: 8px; }
    button {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--panel-border);
      border-radius: 9px;
      color: var(--text);
      background: rgb(255 255 255 / 6%);
      font: inherit;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover { background: rgb(255 255 255 / 12%); }

    .legend { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 14px; margin-top: 2px; }
    .legend-item { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 12px; }
    .swatch { width: 10px; height: 10px; border-radius: 50%; }
    .swatch.normal { background: var(--normal); }
    .swatch.external { background: var(--external); }
    .swatch.low-power { background: var(--low-power); }
    .swatch.critical { background: var(--critical); }
  </style>
</head>
<body>
  <main>
    <section class="card">
      <h1>菜单栏电池状态原型</h1>
      <p class="subtitle">基于确认的电池形状；在这里确认颜色、数字/闪电排布和闪电出现节奏。</p>

      <div class="menu-bar" aria-label="菜单栏图标预览">
        <svg class="battery-svg" viewBox="0 0 98 82" role="img" aria-labelledby="battery-title battery-description">
          <title id="battery-title">菜单栏电池状态</title>
          <desc id="battery-description">电池电量与状态色预览。</desc>
          <defs>
            <clipPath id="body-clip"><rect x="9" y="20" width="69.5" height="39" rx="12" /></clipPath>
          </defs>
          <path class="battery-terminal" d="M 78.5 32 H 82 A 3.5 3.5 0 0 1 85.5 35.5 V 43.5 A 3.5 3.5 0 0 1 82 47 H 78.5 Z" />
          <rect class="battery-body" x="9" y="20" width="69.5" height="39" rx="12" />
          <rect id="battery-fill" class="battery-fill" x="9" y="20" height="39" clip-path="url(#body-clip)" />
          <text id="battery-value" class="battery-value" x="43.75" y="51" font-size="34" text-anchor="middle">85</text>
          <g id="charging-bolt-group">
            <path id="charging-bolt" class="charging-bolt" d="M 4 0 L 0 7 H 3 L 2 12 L 9 4.5 H 5.6 L 7 0 Z" />
          </g>
        </svg>
      </div>

      <div class="status-row">
        <span id="status-dot" class="status-dot"></span>
        <span id="status-text">普通状态 · 85%</span>
      </div>
    </section>

    <section class="card controls">
      <div class="field">
        <label class="field-label" for="level">
          <span>电池电量</span>
          <output id="level-output" for="level">85%</output>
        </label>
        <input id="level" type="range" min="0" max="100" value="85" step="1">
      </div>

      <div class="toggles">
        <label class="toggle"><input id="external-power" type="checkbox"> 接入电源 / 充电</label>
        <label class="toggle"><input id="low-power" type="checkbox"> 低电量模式</label>
      </div>

      <div class="field">
        <span class="field-label"><span>快速状态</span></span>
        <div class="presets">
          <button type="button" data-preset="normal">普通 85%</button>
          <button type="button" data-preset="external">外接电源 85%</button>
          <button type="button" data-preset="low-power">低电量模式 55%</button>
          <button type="button" data-preset="critical">临界电量 15%</button>
        </div>
      </div>

      <div class="legend">
        <div class="legend-item"><span class="swatch normal"></span>普通：中性深灰</div>
        <div class="legend-item"><span class="swatch external"></span>外接电源：绿色 + 闪电</div>
        <div class="legend-item"><span class="swatch low-power"></span>低电量模式：黄色</div>
        <div class="legend-item"><span class="swatch critical"></span>低于 20%：红色</div>
      </div>
    </section>
  </main>

  <script>
    const level = document.querySelector('#level');
    const externalPower = document.querySelector('#external-power');
    const lowPower = document.querySelector('#low-power');
    const levelOutput = document.querySelector('#level-output');
    const fill = document.querySelector('#battery-fill');
    const value = document.querySelector('#battery-value');
    const bolt = document.querySelector('#charging-bolt');
    const boltGroup = document.querySelector('#charging-bolt-group');
    const statusDot = document.querySelector('#status-dot');
    const statusText = document.querySelector('#status-text');
    const root = document.documentElement;
    let wasExternal = false;
    let boltExitTimer;

    const appearanceForState = () => {
      const percentage = Number(level.value);
      if (externalPower.checked) return { key: 'external', color: '#34c759', label: '外接电源 / 充电' };
      if (percentage < 20) return { key: 'critical', color: '#ff3b30', label: '临界电量' };
      if (lowPower.checked) return { key: 'low-power', color: '#ffcc00', label: '低电量模式' };
      return { key: 'normal', color: '#434547', label: '普通状态' };
    };

    const positionContents = (appearance, shouldAnimateEntrance, shouldAnimateExit) => {
      const hasBolt = appearance.key === 'external';
      value.textContent = level.value;
      value.setAttribute('font-size', hasBolt ? '27' : '34');
      value.setAttribute('text-anchor', hasBolt ? 'start' : 'middle');
      value.setAttribute('y', hasBolt ? '50' : '51');

      if (!hasBolt) {
        value.setAttribute('x', '43.75');
        value.classList.remove('entering-charge');
        if (shouldAnimateExit) {
          value.classList.remove('leaving-charge');
          void value.getBoundingClientRect();
          value.classList.add('leaving-charge');
          bolt.classList.remove('entering', 'exiting');
          void bolt.getBoundingClientRect();
          bolt.classList.add('visible', 'exiting');
          clearTimeout(boltExitTimer);
          boltExitTimer = setTimeout(() => bolt.classList.remove('visible', 'exiting'), 280);
        } else {
          value.classList.remove('leaving-charge');
          bolt.classList.remove('visible', 'entering', 'exiting');
        }
        return;
      }

      // The text and bolt are measured as one group, then centered in the
      // battery body so 1–3 digit values stay visually balanced.
      const textWidth = value.getComputedTextLength();
      const boltWidth = 9;
      // Keep the bolt visually attached to the percentage; the narrow gap is
      // intentional because the bolt's left edge has a little built-in shape.
      const gap = 0.5;
      const groupWidth = textWidth + gap + boltWidth;
      // The lightning's visual weight is slightly right-biased, so offset the
      // combined label group a little to the right while keeping the normal
      // percentage label exactly centered.
      const chargingGroupOffset = 3.5;
      const startX = 43.75 + chargingGroupOffset - groupWidth / 2;
      const boltX = startX + textWidth + gap;
      value.setAttribute('x', String(startX));
      boltGroup.setAttribute('transform', `translate(${boltX} 34)`);
      clearTimeout(boltExitTimer);
      value.classList.remove('leaving-charge');
      bolt.classList.remove('exiting');
      bolt.classList.add('visible');

      if (shouldAnimateEntrance) {
        value.classList.remove('entering-charge');
        void value.getBoundingClientRect();
        value.classList.add('entering-charge');
        bolt.classList.remove('entering');
        void bolt.getBoundingClientRect();
        bolt.classList.add('entering');
      }
    };

    const update = () => {
      const percentage = Number(level.value);
      const appearance = appearanceForState();
      const isExternal = appearance.key === 'external';
      const shouldAnimateEntrance = isExternal && !wasExternal;
      const shouldAnimateExit = !isExternal && wasExternal;

      root.style.setProperty('--active-fill', appearance.color);
      fill.style.fill = appearance.color;
      fill.setAttribute('width', String(69.5 * percentage / 100));
      levelOutput.value = `${percentage}%`;
      levelOutput.textContent = `${percentage}%`;
      statusDot.className = `status-dot ${appearance.key}`;
      statusText.textContent = `${appearance.label} · ${percentage}%`;
      positionContents(appearance, shouldAnimateEntrance, shouldAnimateExit);
      wasExternal = isExternal;
    };

    level.addEventListener('input', update);
    externalPower.addEventListener('change', update);
    lowPower.addEventListener('change', update);

    document.querySelectorAll('[data-preset]').forEach((button) => {
      button.addEventListener('click', () => {
        const preset = button.dataset.preset;
        externalPower.checked = preset === 'external';
        lowPower.checked = preset === 'low-power';
        level.value = preset === 'critical' ? '15' : preset === 'low-power' ? '55' : '85';
        update();
      });
    });

    update();
  </script>
</body>
</html>
